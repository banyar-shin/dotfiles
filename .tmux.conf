set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Make numbering match how people count tabs.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Better terminal ergonomics.
set -g mouse on
set -g history-limit 100000
setw -g automatic-rename off
set -g set-clipboard on

# Split panes with direction-shaped keys.
bind Enter split-window -h
bind \\ split-window -v
unbind '"'
unbind %

# Use prefix + hjkl to move like AeroSpace, keep arrows too.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r Left select-pane -L
bind -r Right select-pane -R
bind -r Up select-pane -U
bind -r Down select-pane -D

# Window cycling like WezTerm tab movement.
bind Tab next-window
bind BTab previous-window
bind -r H previous-window
bind -r L next-window
bind -n M-Tab next-window
bind -n M-BTab previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Easier reload and session/window pickers.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind e choose-tree -Zw
bind Space last-window

# Vi-style copy/scroll mode keys.
setw -g mode-keys vi

# Slightly quicker escape handling.
set -sg escape-time 10

# Compact status bar.
set -g status-left-length 30
set -g status-right-length 80
set -g status-left '#S '
set -g status-right '#(whoami) | %Y-%m-%d %H:%M '
