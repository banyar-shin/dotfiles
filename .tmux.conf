set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Make numbering match how people count tabs.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Better terminal ergonomics.
set -g mouse on
set -g history-limit 100000
setw -g automatic-rename off
set -g set-clipboard on

# Split panes with direction-shaped keys.
bind Enter split-window -h -c '#{pane_current_path}'
bind \\ split-window -v -c '#{pane_current_path}'
bind -n M-Enter split-window -h -c '#{pane_current_path}'
bind -n M-\\ split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Use prefix + hjkl to move like AeroSpace, keep arrows too.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-[ select-pane -L
bind -n M-] select-pane -R
bind -n M-- select-pane -U
bind -n M-= select-pane -D
bind -r Left select-pane -L
bind -r Right select-pane -R
bind -r Up select-pane -U
bind -r Down select-pane -D

# Window cycling like WezTerm tab movement.
bind Tab next-window
bind BTab previous-window
bind -r H previous-window
bind -r L next-window
bind -n M-Tab next-window
bind -n M-BTab previous-window
bind -n M-< swap-window -t -1 \; previous-window
bind -n M-> swap-window -t +1 \; next-window
bind -n M-t new-window -c '#{pane_current_path}'
bind -n M-w if-shell -F '#{==:#{window_panes},1}' 'confirm-before -p "kill window #W? (y/n)" kill-window' 'confirm-before -p "kill pane #P? (y/n)" kill-pane'
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Easier reload and session/window pickers.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind e choose-tree -Zw
bind Space last-window

# Vi-style copy/scroll mode keys.
setw -g mode-keys vi

# Slightly quicker escape handling.
set -sg escape-time 10

# Compact status bar.
set -g status on
set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 80
set -g status-style bg=#282828,fg=#ebdbb2
set -g status-left-style bg=#458588,fg=#282828,bold
set -g status-right-style bg=#3c3836,fg=#a89984
set -g status-left ' #S '
set -g status-right ' #(whoami) | %Y-%m-%d %H:%M '
setw -g window-status-separator ''
setw -g window-status-style bg=#282828,fg=#a89984
setw -g window-status-format ' #I:#W '
setw -g window-status-current-style bg=#ff9248,fg=#282828,bold
setw -g window-status-current-format ' #I:#W '
setw -g window-status-last-style bg=#282828,fg=#a89984
set -g pane-border-style fg=#504945
set -g pane-active-border-style fg=#689d6a
